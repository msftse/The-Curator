# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
#
# Azure Developer CLI manifest for Agentic Skill Hub.
#
# This project uses a two-stage deploy by design:
#   1. `azd provision` (or `azd up`) — owns the Azure infra lifecycle.
#   2. `scripts/helm-deploy-dev.sh` — builds + ships the four container
#      images and `helm upgrade`s the umbrella chart in `charts/`.
#
# `azd deploy` is intentionally NOT supported. The app runs on AKS, not on
# App Service or Static Web Apps, so there are no `services:` to define
# here. Use the helm script for application changes. See README.md §
# "Deploying to Azure" for the full flow.
#
# Usage:
#   azd auth login
#   azd env new dev              # env name MUST be one of: dev | staging | prod
#                                # (enforced by infra/main.bicep `@allowed`)
#   azd env set AZURE_LOCATION eastus2
#   azd env set AUTH_MODE oidc   # then set ENTRA_* (see README.md step 2)
#   azd provision                # spin up infra only
#
# Post-provision, Key Vault secrets are placeholders. Seed them before
# deploying the app — see README.md step 4.

name: agentic-skill-hub
metadata:
  template: agentic-skill-hub@0.1.0

infra:
  provider: bicep
  path: infra
  module: main
