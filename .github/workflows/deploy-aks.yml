name: deploy-aks

# AKS deploy pipeline. Three phases (infra is NOT one of them):
#   1. discover   — read existing Bicep deployment outputs from RG
#   2. images     — build + push all four images, tagged with the git SHA
#   3. helm       — helm upgrade --install per env
#   4. smoke      — health + readiness checks; rollback on failure
#
# Two-stage deploy model (per AGENTS.md): `azd` owns infra lifecycle,
# this workflow owns images + Helm only. Bicep is NEVER applied here.
# To change infra, run `azd provision` locally against the target env.
#
# Trigger: workflow_dispatch only. Push triggers were removed to prevent
# accidental deploys on every commit to main. Tag releases dispatch via
# the GitHub Releases workflow when added.
#
# Identity: federated GitHub OIDC -> Azure subscription. The federated
# credential and role assignment are provisioned by
# scripts/setup_federated_credentials.sh (see infra/README.md).

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aks-${{ github.event.inputs.env || 'dev' }}
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # -----------------------------------------------------------------------
  # 0. resolve target environment from trigger
  # -----------------------------------------------------------------------
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.pick.outputs.env }}
      rg:  ${{ steps.pick.outputs.rg }}
    steps:
      - id: pick
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.env }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV="prod"
          else
            ENV="dev"
          fi
          echo "env=$ENV"               >> "$GITHUB_OUTPUT"
          echo "rg=rg-$ENV"             >> "$GITHUB_OUTPUT"

  # -----------------------------------------------------------------------
  # 1. discover — read outputs from the latest successful azd deployment.
  # We do NOT run bicep here. Infra is owned by `azd provision`, run from
  # an operator's laptop (or a separate infra pipeline). This job only
  # reads the outputs the deployment already produced.
  # -----------------------------------------------------------------------
  discover:
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.env }}
    outputs:
      acrLoginServer:        ${{ steps.outs.outputs.acrLoginServer }}
      aksName:               ${{ steps.outs.outputs.aksName }}
      tenantId:              ${{ steps.outs.outputs.tenantId }}
      frontendClientId:      ${{ steps.outs.outputs.frontendClientId }}
      backendClientId:       ${{ steps.outs.outputs.backendClientId }}
      classifierClientId:    ${{ steps.outs.outputs.classifierClientId }}
      curatorClientId:       ${{ steps.outs.outputs.curatorClientId }}
      backendK8sJobsClientId: ${{ steps.outs.outputs.backendK8sJobsClientId }}
      backendObjectId:       ${{ steps.outs.outputs.backendObjectId }}
      classifierObjectId:    ${{ steps.outs.outputs.classifierObjectId }}
      curatorObjectId:       ${{ steps.outs.outputs.curatorObjectId }}
      keyVaultName:          ${{ steps.outs.outputs.keyVaultName }}
      cosmosEndpoint:        ${{ steps.outs.outputs.cosmosEndpoint }}
      cosmosDbName:          ${{ steps.outs.outputs.cosmosDbName }}
      blobAccountUrl:        ${{ steps.outs.outputs.blobAccountUrl }}
      redisHost:             ${{ steps.outs.outputs.redisHost }}
      appInsightsConn:       ${{ steps.outs.outputs.appInsightsConn }}
      entraClientId:         ${{ steps.outs.outputs.entraClientId }}
      entraSpaClientId:      ${{ steps.outs.outputs.entraSpaClientId }}
      entraGroupIdAdmin:     ${{ steps.outs.outputs.entraGroupIdAdmin }}
      entraApiScope:         ${{ steps.outs.outputs.entraApiScope }}
      frontendHost:          ${{ steps.outs.outputs.frontendHost }}
      backendHost:           ${{ steps.outs.outputs.backendHost }}
    env:
      ENV: ${{ needs.resolve-env.outputs.env }}
      RG:  ${{ needs.resolve-env.outputs.rg }}
    steps:
      - name: Azure login (OIDC federated)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Find latest successful infra deployment
        id: find
        run: |
          # The root deployment from `azd provision` is the only one with
          # our outputs. We can't filter by `outputs` server-side, so list
          # Succeeded deployments newest-first and pick the first one whose
          # `acrLoginServer` output is populated. This skips module child
          # deployments (`identity`, `aks`, etc.) and Azure platform
          # auto-deployments (Failure-Anomalies-Alert-Rule, etc.).
          set -euo pipefail
          NAMES=$(az deployment group list -g "$RG" \
            --query "reverse(sort_by([?properties.provisioningState=='Succeeded'], &properties.timestamp))[].name" \
            -o tsv)
          if [[ -z "$NAMES" ]]; then
            echo "::error::No successful deployments found in $RG. Run 'azd provision' first."
            exit 1
          fi
          MATCH=""
          while IFS= read -r N; do
            [[ -z "$N" ]] && continue
            HAS=$(az deployment group show -g "$RG" -n "$N" \
              --query "properties.outputs.acrLoginServer.value" -o tsv 2>/dev/null || true)
            if [[ -n "$HAS" ]]; then
              MATCH="$N"
              break
            fi
          done <<< "$NAMES"
          if [[ -z "$MATCH" ]]; then
            echo "::error::No deployment in $RG exposes acrLoginServer. Run 'azd provision'."
            exit 1
          fi
          echo "Using deployment: $MATCH"
          echo "name=$MATCH" >> "$GITHUB_OUTPUT"

      - name: Fetch deployment outputs
        run: |
          az deployment group show -g "$RG" -n "${{ steps.find.outputs.name }}" \
            --query properties.outputs -o json > deployment.json
          jq 'keys' deployment.json

      - name: Export deployment outputs
        id: outs
        env:
          FRONTEND_HOST: ${{ vars.FRONTEND_HOST }}
          BACKEND_HOST:  ${{ vars.BACKEND_HOST }}
        run: |
          OUTS=$(cat deployment.json)
          # Identity + cluster
          echo "acrLoginServer=$(echo "$OUTS"        | jq -r '.acrLoginServer.value')"        >> "$GITHUB_OUTPUT"
          echo "aksName=$(echo "$OUTS"               | jq -r '.clusterName.value')"           >> "$GITHUB_OUTPUT"
          echo "tenantId=$(echo "$OUTS"              | jq -r '.entraTenantId.value // empty')" >> "$GITHUB_OUTPUT"
          # UAMI client + principal IDs
          echo "frontendClientId=$(echo "$OUTS"      | jq -r '.frontendUamiClientId.value')"   >> "$GITHUB_OUTPUT"
          echo "backendClientId=$(echo "$OUTS"       | jq -r '.backendUamiClientId.value')"    >> "$GITHUB_OUTPUT"
          echo "classifierClientId=$(echo "$OUTS"    | jq -r '.classifierUamiClientId.value')" >> "$GITHUB_OUTPUT"
          echo "curatorClientId=$(echo "$OUTS"       | jq -r '.curatorUamiClientId.value')"    >> "$GITHUB_OUTPUT"
          echo "backendK8sJobsClientId=$(echo "$OUTS"| jq -r '.backendK8sJobsUamiClientId.value')" >> "$GITHUB_OUTPUT"
          echo "backendObjectId=$(echo "$OUTS"       | jq -r '.backendUamiPrincipalId.value // empty')"    >> "$GITHUB_OUTPUT"
          echo "classifierObjectId=$(echo "$OUTS"    | jq -r '.classifierUamiPrincipalId.value // empty')" >> "$GITHUB_OUTPUT"
          echo "curatorObjectId=$(echo "$OUTS"       | jq -r '.curatorUamiPrincipalId.value // empty')"    >> "$GITHUB_OUTPUT"
          # Data-plane endpoints
          echo "keyVaultName=$(echo "$OUTS"          | jq -r '.keyVaultName.value // empty')"  >> "$GITHUB_OUTPUT"
          echo "cosmosEndpoint=$(echo "$OUTS"        | jq -r '.cosmosEndpoint.value // empty')" >> "$GITHUB_OUTPUT"
          echo "cosmosDbName=$(echo "$OUTS"          | jq -r '.cosmosDbName.value // empty')"   >> "$GITHUB_OUTPUT"
          echo "blobAccountUrl=$(echo "$OUTS"        | jq -r '.blobAccountUrl.value // empty')" >> "$GITHUB_OUTPUT"
          echo "redisHost=$(echo "$OUTS"             | jq -r '.redisHost.value // empty')"      >> "$GITHUB_OUTPUT"
          {
            echo "appInsightsConn<<EOF"
            echo "$OUTS" | jq -r '.appInsightsConnectionString.value // empty'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # Entra (public coordinates)
          echo "entraClientId=$(echo "$OUTS"         | jq -r '.entraClientId.value // empty')"    >> "$GITHUB_OUTPUT"
          echo "entraSpaClientId=$(echo "$OUTS"      | jq -r '.entraSpaClientId.value // empty')" >> "$GITHUB_OUTPUT"
          echo "entraGroupIdAdmin=$(echo "$OUTS"     | jq -r '.entraGroupIdAdmin.value // empty')" >> "$GITHUB_OUTPUT"
          echo "entraApiScope=$(echo "$OUTS"         | jq -r '.entraApiScope.value // empty')"    >> "$GITHUB_OUTPUT"
          # Hostnames (GH env vars)
          echo "frontendHost=${FRONTEND_HOST}"                                                  >> "$GITHUB_OUTPUT"
          echo "backendHost=${BACKEND_HOST}"                                                    >> "$GITHUB_OUTPUT"

  # -----------------------------------------------------------------------
  # 2. images — build & push all four images.
  # Tags: <sha> (immutable, used by helm) + <env>-latest (mutable, ops convenience).
  # -----------------------------------------------------------------------
  images:
    needs: [resolve-env, discover]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.env }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - component: frontend
            dockerfile: Dockerfile.frontend
          - component: backend
            dockerfile: Dockerfile.backend
          - component: classifier
            dockerfile: Dockerfile.classifier
          - component: curator
            dockerfile: Dockerfile.curator
    env:
      ACR: ${{ needs.discover.outputs.acrLoginServer }}
      ENV: ${{ needs.resolve-env.outputs.env }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC federated)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${ACR%%.*}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ACR }}/skillhub-${{ matrix.component }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR }}/skillhub-${{ matrix.component }}:${{ env.ENV }}-latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to:   type=gha,scope=${{ matrix.component }},mode=max

  # -----------------------------------------------------------------------
  # 3. helm — upgrade --install the umbrella chart against the target AKS.
  # All required `--set` values come from the infra job outputs. Smoke test
  # rolls back on failure (helm --atomic --wait).
  # -----------------------------------------------------------------------
  helm:
    needs: [resolve-env, discover, images]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.env }}
    env:
      ENV: ${{ needs.resolve-env.outputs.env }}
      RG:  ${{ needs.resolve-env.outputs.rg }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC federated)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.1.4

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RG }}
          cluster-name:   ${{ needs.discover.outputs.aksName }}
          # Use the kubelogin/AAD path so the GH OIDC token authenticates to
          # the cluster (cluster has `disableLocalAccounts: true` in prod).
          admin: "false"
          use-kubelogin: "true"

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Helm upgrade --install
        run: |
          # Wire every per-env coordinate from the infra outputs. Anything
          # secret stays in Key Vault and is mounted by the SecretProviderClass
          # (configured in values.yaml `keyVault.secrets.*`). Anything that's
          # a discoverable identifier (URLs, IDs, OIDs) flows through here
          # so values-*.yaml in git stays environment-agnostic.
          helm upgrade --install skillhub charts/agentic-skill-hub \
            --namespace skillhub --create-namespace \
            --values charts/agentic-skill-hub/values-${ENV}.yaml \
            --set image.tag="${IMAGE_TAG}" \
            --set global.azureTenantId="${{ needs.discover.outputs.tenantId }}" \
            --set global.imageRegistry="${{ needs.discover.outputs.acrLoginServer }}" \
            --set global.workloadIdentity.frontendClientId="${{ needs.discover.outputs.frontendClientId }}" \
            --set global.workloadIdentity.backendClientId="${{ needs.discover.outputs.backendClientId }}" \
            --set global.workloadIdentity.classifierClientId="${{ needs.discover.outputs.classifierClientId }}" \
            --set global.workloadIdentity.curatorClientId="${{ needs.discover.outputs.curatorClientId }}" \
            --set global.workloadIdentity.backendK8sJobsClientId="${{ needs.discover.outputs.backendK8sJobsClientId }}" \
            --set global.workloadIdentityObjectIds.backend="${{ needs.discover.outputs.backendObjectId }}" \
            --set global.workloadIdentityObjectIds.classifier="${{ needs.discover.outputs.classifierObjectId }}" \
            --set global.workloadIdentityObjectIds.curator="${{ needs.discover.outputs.curatorObjectId }}" \
            --set keyVault.name="${{ needs.discover.outputs.keyVaultName }}" \
            --set keyVault.tenantId="${{ needs.discover.outputs.tenantId }}" \
            --set ingress.hosts.frontend="${{ needs.discover.outputs.frontendHost }}" \
            --set ingress.hosts.backend="${{ needs.discover.outputs.backendHost }}" \
            --set backend.env.COSMOS_ENDPOINT="${{ needs.discover.outputs.cosmosEndpoint }}" \
            --set backend.env.COSMOS_DB_NAME="${{ needs.discover.outputs.cosmosDbName }}" \
            --set backend.env.BLOB_ACCOUNT_URL="${{ needs.discover.outputs.blobAccountUrl }}" \
            --set backend.env.REDIS_HOST="${{ needs.discover.outputs.redisHost }}" \
            --set backend.env.CORS_ORIGINS="https://${{ needs.discover.outputs.frontendHost }}" \
            --set-string backend.env.APPINSIGHTS_CONNECTION_STRING="${{ needs.discover.outputs.appInsightsConn }}" \
            --set classifier.env.COSMOS_ENDPOINT="${{ needs.discover.outputs.cosmosEndpoint }}" \
            --set classifier.env.COSMOS_DB_NAME="${{ needs.discover.outputs.cosmosDbName }}" \
            --set classifier.env.BLOB_ACCOUNT_URL="${{ needs.discover.outputs.blobAccountUrl }}" \
            --set classifier.env.REDIS_HOST="${{ needs.discover.outputs.redisHost }}" \
            --set-string classifier.env.APPINSIGHTS_CONNECTION_STRING="${{ needs.discover.outputs.appInsightsConn }}" \
            --set curator.env.COSMOS_ENDPOINT="${{ needs.discover.outputs.cosmosEndpoint }}" \
            --set curator.env.COSMOS_DB_NAME="${{ needs.discover.outputs.cosmosDbName }}" \
            --set curator.env.BLOB_ACCOUNT_URL="${{ needs.discover.outputs.blobAccountUrl }}" \
            --set curator.env.REDIS_HOST="${{ needs.discover.outputs.redisHost }}" \
            --set-string curator.env.APPINSIGHTS_CONNECTION_STRING="${{ needs.discover.outputs.appInsightsConn }}" \
            --set frontend.env.API_BASE="https://${{ needs.discover.outputs.backendHost }}" \
            --atomic --wait --timeout=10m

  # -----------------------------------------------------------------------
  # 4. smoke — post-deploy health checks. `--atomic` already rolled back if
  # the deployment never went Ready; this is the live-traffic acceptance.
  # -----------------------------------------------------------------------
  smoke:
    needs: [resolve-env, discover, helm]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.env }}
    env:
      RG:  ${{ needs.resolve-env.outputs.rg }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC federated)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.1.4

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RG }}
          cluster-name:   ${{ needs.discover.outputs.aksName }}
          admin: "false"
          use-kubelogin: "true"

      - name: Wait for deployments Available
        run: |
          kubectl -n skillhub wait \
            --for=condition=available \
            --timeout=300s \
            deployment/skillhub-agentic-skill-hub-backend \
            deployment/skillhub-agentic-skill-hub-frontend

      - name: Backend /health probe
        run: |
          BACKEND_HOST="${{ needs.discover.outputs.backendHost }}"
          if [[ -z "$BACKEND_HOST" ]]; then
            echo "no backend host wired — skipping ingress health check"
            exit 0
          fi
          for i in {1..30}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://${BACKEND_HOST}/health" || true)
            if [[ "$CODE" == "200" ]]; then
              echo "backend healthy on attempt $i"
              exit 0
            fi
            echo "attempt $i: got $CODE, retrying in 5s"
            sleep 5
          done
          echo "backend /health never returned 200; rolling back"
          helm rollback skillhub -n skillhub
          exit 1
