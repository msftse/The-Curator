# Prod overlay — TLS, zone-redundant scheduling, larger resource ceilings.

frontend:
  replicas: 3
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  podDisruptionBudget:
    minAvailable: 2

backend:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: 2000m
      memory: 1536Mi
  podDisruptionBudget:
    minAvailable: 2

classifier:
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: 2000m
      memory: 2048Mi
  keda:
    pollingInterval: 15
    cooldownPeriod: 300
    maxReplicaCount: 10

curator:
  schedule: "0 3 * * *"
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: 2000m
      memory: 2048Mi

ingress:
  tls:
    enabled: true
    secretName: ""

networkPolicy:
  # Tighten egress in prod. CIDRs should be the private endpoint subnets
  # for each Azure service (filled by operations after first deploy).
  egress:
    backend:
      cidrs:
        - cidr: "10.0.0.0/8"
          ports: [443, 6380]
    classifier:
      cidrs:
        - cidr: "10.0.0.0/8"
          ports: [443, 6380]
    curator:
      cidrs:
        - cidr: "10.0.0.0/8"
          ports: [443, 6380]
