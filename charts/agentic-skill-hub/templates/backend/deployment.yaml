{{- $component := "backend" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skillhub.componentName" $ctx }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "skillhub.selectorLabels" $ctx | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "skillhub.selectorLabels" $ctx | nindent 8 }}
        {{- include "skillhub.wiPodLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ $component }}
      securityContext:
        {{- include "skillhub.podSecurityContext" . | nindent 8 }}
      containers:
        - name: backend
          image: {{ include "skillhub.image" $ctx }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "skillhub.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- include "skillhub.envFromMap" .Values.backend.env | nindent 12 }}
            # REDIS_ENTRA_USERNAME is the backend UAMI's principal OID —
            # Redis ACL identifies callers by OID, not client id. Computed
            # here (not in values.yaml) so the chart never has to repeat
            # the same id it already gets from the workflow's --set.
            - name: REDIS_ENTRA_USERNAME
              value: {{ include "skillhub.wiPrincipalId" (dict "Values" .Values "component" "backend") | quote }}
            # APIKEY_PEPPER mirrored from Key Vault via the SecretProviderClass
            # (templates/backend/secretproviderclass.yaml). The K8s Secret is
            # only populated once a pod with the SPC volume mount starts, so
            # the mount + this env var are both gated on
            # `keyVault.secrets.backend` being non-empty.
            {{- if has "apikey-pepper" .Values.keyVault.secrets.backend }}
            - name: APIKEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-apikey-pepper" (include "skillhub.componentName" $ctx) }}
                  key: apikey-pepper
            {{- end }}
            # Entra coordinates from KV. These override the (typically empty)
            # same-named keys in .Values.backend.env above — K8s takes the
            # LAST entry when an env name repeats. Backend validates Entra
            # JWTs via JWKS, so the tenant id + audience (api app client id)
            # + admin group id are all it needs. AGENTS.md §6a documents
            # these as public coordinates; they live in KV for single-rotation
            # surface and to dodge the GH-Actions step-output redaction bug.
            {{- if has "entra-tenant-id" .Values.keyVault.secrets.backend }}
            - name: ENTRA_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-entra-tenant-id" (include "skillhub.componentName" $ctx) }}
                  key: entra-tenant-id
            {{- end }}
            {{- if has "entra-client-id" .Values.keyVault.secrets.backend }}
            - name: ENTRA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-entra-client-id" (include "skillhub.componentName" $ctx) }}
                  key: entra-client-id
            {{- end }}
            {{- if has "entra-group-id-admin" .Values.keyVault.secrets.backend }}
            - name: ENTRA_GROUP_ID_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-entra-group-id-admin" (include "skillhub.componentName" $ctx) }}
                  key: entra-group-id-admin
            {{- end }}
            # AZURE_AI_FOUNDRY_API_KEY is NOT injected for the backend today
            # (only classifier + curator hit Foundry). Add a valueFrom block
            # here if that changes.
          {{- if .Values.keyVault.secrets.backend }}
          volumeMounts:
            {{- include "skillhub.spcVolumeMount" . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      {{- if .Values.keyVault.secrets.backend }}
      volumes:
        {{- include "skillhub.spcVolume" $ctx | nindent 8 }}
      {{- end }}
