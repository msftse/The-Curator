{{- /*
SecretProviderClass for the backend pod.

The CSI driver mounts each KV secret listed in `keyVault.secrets.backend`
at /mnt/secrets-store/<secretName> AND mirrors each one into a K8s
Secret named `<componentName>-<secretName>`. Deployments then reference
the K8s Secret via `valueFrom: secretKeyRef` to expose KV-sourced values
as pod env vars without any helm-render-time secret material. The pod's
`serviceAccountName: backend` + workload identity drives the auth to Key
Vault — the backend UAMI has Key Vault Secrets User on the vault
(infra/modules/rbac.bicep).

If no secrets are listed for backend, the SPC is skipped entirely so we
don't ship an empty resource.

Convention (matches classifier + curator SPCs):
  - One K8s Secret per logical KV secret.
  - Secret name = `<componentName>-<kv-secret-name>`.
  - Secret data key = the KV secret name verbatim.

Secret rotation: the CSI driver re-polls KV every `rotationPollInterval`
(2m on dev — set in infra/modules/aks.bicep). Pods receive the new value
in the mounted file immediately; the mirrored K8s Secret is updated by
the rotation reconciler but pod env vars are baked at pod start, so a
rotation only takes effect after the next pod restart.
*/ -}}
{{- if .Values.keyVault.secrets.backend -}}
{{- $component := "backend" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ printf "%s-secrets" (include "skillhub.componentName" $ctx) }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ include "skillhub.wiClientId" $ctx | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyVault.secrets.backend }}
        - |
          objectName: {{ . | quote }}
          objectType: secret
        {{- end }}
  # Mirror each mounted KV secret into a dedicated K8s Secret so the
  # deployment can expose it as an env var via secretKeyRef.
  secretObjects:
    {{- range .Values.keyVault.secrets.backend }}
    - secretName: {{ printf "%s-%s" (include "skillhub.componentName" $ctx) . | quote }}
      type: Opaque
      data:
        - objectName: {{ . | quote }}
          key: {{ . | quote }}
    {{- end }}
{{- end -}}
