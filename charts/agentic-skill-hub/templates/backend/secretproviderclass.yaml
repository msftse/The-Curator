{{- /*
SecretProviderClass for the backend pod.

The CSI driver mounts each KV secret listed in `keyVault.secrets.backend`
at /mnt/secrets-store/<secretName>. The pod's `serviceAccountName: backend`
+ workload identity drives the auth to Key Vault — the backend UAMI has
Key Vault Secrets User on the vault (infra/modules/rbac.bicep).

If no secrets are listed for backend (the default in values.yaml), the
SPC is skipped entirely so we don't ship an empty resource.
*/ -}}
{{- if .Values.keyVault.secrets.backend -}}
{{- $component := "backend" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ printf "%s-secrets" (include "skillhub.componentName" $ctx) }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ include "skillhub.wiClientId" $ctx | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyVault.secrets.backend }}
        - |
          objectName: {{ . | quote }}
          objectType: secret
        {{- end }}
{{- end -}}
