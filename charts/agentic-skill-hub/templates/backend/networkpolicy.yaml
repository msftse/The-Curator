{{- if .Values.networkPolicy.enabled -}}
{{- $component := "backend" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skillhub.componentName" $ctx }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "skillhub.selectorLabels" $ctx | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  # Ingress: ingress-nginx controller (in `ingress-nginx` namespace) +
  # frontend pods in this namespace.
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
        - podSelector:
            matchLabels:
              {{- include "skillhub.selectorLabels" (dict "component" "frontend" "Chart" .Chart "Release" .Release) | nindent 14 }}
      ports:
        - port: http
          protocol: TCP
  egress:
    # Cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: {{ .Values.networkPolicy.dnsPort }}
          protocol: UDP
        - port: {{ .Values.networkPolicy.dnsPort }}
          protocol: TCP
    # K8s API — backend's curator on-demand path POSTs `create jobs`.
    # In AKS the kubernetes.default Service maps to the API server ClusterIP
    # in `default` namespace; allow port 443 to it.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      ports:
        - port: 443
          protocol: TCP
    # External egress (Azure data services + Entra). CIDRs per-env via values.
    {{- range .Values.networkPolicy.egress.backend.cidrs }}
    - to:
        - ipBlock:
            cidr: {{ .cidr | quote }}
      ports:
        {{- range .ports }}
        - port: {{ . }}
          protocol: TCP
        {{- end }}
    {{- end }}
{{- end -}}
