{{- if .Values.networkPolicy.enabled -}}
{{- $component := "curator" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skillhub.componentName" $ctx }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "skillhub.selectorLabels" $ctx | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  # No inbound — curator pods are batch consumers.
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: {{ .Values.networkPolicy.dnsPort }}
          protocol: UDP
        - port: {{ .Values.networkPolicy.dnsPort }}
          protocol: TCP
    {{- range .Values.networkPolicy.egress.curator.cidrs }}
    - to:
        - ipBlock:
            cidr: {{ .cidr | quote }}
      ports:
        {{- range .ports }}
        - port: {{ . }}
          protocol: TCP
        {{- end }}
    {{- end }}
{{- end -}}
