{{- /*
SecretProviderClass for the curator pod (shared between scheduled CronJob
and the curator-ondemand template).
*/ -}}
{{- if .Values.keyVault.secrets.curator -}}
{{- $component := "curator" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ printf "%s-secrets" (include "skillhub.componentName" $ctx) }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ include "skillhub.wiClientId" $ctx | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyVault.secrets.curator }}
        - |
          objectName: {{ . | quote }}
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: {{ printf "%s-foundry" (include "skillhub.componentName" $ctx) }}
      type: Opaque
      data:
        - objectName: "foundry-api-key"
          key: foundry-api-key
{{- end -}}
