{{- /*
SecretProviderClass for the classifier pod.

Mounts:
  - foundry-api-key  (LLM provider creds; exposed as AZURE_AI_FOUNDRY_API_KEY env)
  - redis-keda-key   (Redis access key, *only* for the KEDA Redis scaler's
                      TriggerAuthentication; app pods still use Entra.
                      See templates/classifier/triggerauth.yaml.)

`secretObjects.syncSecret.enabled: true` is what creates the K8s Secret
that KEDA's TriggerAuthentication references. Without that, the SPC mount
only materialises files on the *pod's* filesystem, not as a cluster
Secret — KEDA needs the latter.
*/ -}}
{{- $component := "classifier" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ printf "%s-secrets" (include "skillhub.componentName" $ctx) }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ include "skillhub.wiClientId" $ctx | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyVault.secrets.classifier }}
        - |
          objectName: {{ . | quote }}
          objectType: secret
        {{- end }}
        - |
          objectName: "redis-keda-key"
          objectType: secret
  # Sync select KV secrets into native K8s Secrets so other resources
  # (TriggerAuthentication, env valueFrom) can reference them.
  secretObjects:
    - secretName: {{ printf "%s-foundry" (include "skillhub.componentName" $ctx) }}
      type: Opaque
      data:
        - objectName: "foundry-api-key"
          key: foundry-api-key
    - secretName: {{ printf "%s-redis-keda" (include "skillhub.componentName" $ctx) }}
      type: Opaque
      data:
        - objectName: "redis-keda-key"
          key: redis-keda-key
