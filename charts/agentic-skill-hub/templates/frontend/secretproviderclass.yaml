{{- /*
SecretProviderClass for the frontend pod.

Mirrors the backend SPC pattern (see templates/backend/secretproviderclass.yaml
for the long-form rationale). The frontend's UAMI is granted Key Vault
Secrets User by infra/modules/rbac.bicep's `frontendKvAssignment` — that
grant is intentionally scoped to KV only, NOT to Cosmos / Blob / Redis,
preserving AGENTS.md §3 ("frontend has no data-plane access").

The Entra coordinates mounted here (tenant id, SPA client id, api scope)
are public — they're emitted as `window.__ENV__` by app/env.js/route.ts
for the browser to use for MSAL PKCE redirect. They live in KV because:
  1. Single rotation surface for everything Entra-related.
  2. Sidesteps the GitHub Actions step-output redaction bug that empties
     values matching repo secrets (e.g. AZURE_TENANT_ID).

If no secrets are listed for frontend, the SPC is skipped entirely.
*/ -}}
{{- if .Values.keyVault.secrets.frontend -}}
{{- $component := "frontend" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ printf "%s-secrets" (include "skillhub.componentName" $ctx) }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ include "skillhub.wiClientId" $ctx | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyVault.secrets.frontend }}
        - |
          objectName: {{ . | quote }}
          objectType: secret
        {{- end }}
  secretObjects:
    {{- range .Values.keyVault.secrets.frontend }}
    - secretName: {{ printf "%s-%s" (include "skillhub.componentName" $ctx) . | quote }}
      type: Opaque
      data:
        - objectName: {{ . | quote }}
          key: {{ . | quote }}
    {{- end }}
{{- end -}}
