{{- if .Values.networkPolicy.enabled -}}
{{- $component := "frontend" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "skillhub.componentName" $ctx }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "skillhub.selectorLabels" $ctx | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  # Ingress: only from AGIC pods (the ingress controller) and other pods in
  # the namespace (none today, but cheap to allow). AGIC runs in
  # `kube-system` with label `app=ingress-appgw`.
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app: ingress-appgw
      ports:
        - port: http
          protocol: TCP
  # Egress: cluster DNS + the backend Service in this namespace.
  # No outbound internet — the frontend never talks to Azure directly.
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: {{ .Values.networkPolicy.dnsPort }}
          protocol: UDP
        - port: {{ .Values.networkPolicy.dnsPort }}
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              {{- include "skillhub.selectorLabels" (dict "component" "backend" "Chart" .Chart "Release" .Release) | nindent 14 }}
      ports:
        - port: http
          protocol: TCP
{{- end -}}
