{{- /*
SecretProviderClass for the notifier pod (M5-5).

Mounts:
  - acs-connection-string  (ACS auth; exposed as ACS_CONNECTION_STRING)
  - redis-keda-key         (only for the KEDA Redis scaler's
                            TriggerAuthentication; notifier app pods
                            authenticate with Entra workload identity.)

`secretObjects` creates the K8s Secret that KEDA's TriggerAuthentication
references; without it the SPC mount only materialises files on the pod
filesystem, not as a cluster Secret.
*/ -}}
{{- $component := "notifier" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ printf "%s-secrets" (include "skillhub.componentName" $ctx) }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ include "skillhub.wiClientId" $ctx | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyVault.secrets.notifier }}
        - |
          objectName: {{ . | quote }}
          objectType: secret
        {{- end }}
        - |
          objectName: "redis-keda-key"
          objectType: secret
  secretObjects:
    - secretName: {{ printf "%s-acs" (include "skillhub.componentName" $ctx) }}
      type: Opaque
      data:
        - objectName: "acs-connection-string"
          key: acs-connection-string
    - secretName: {{ printf "%s-redis-keda" (include "skillhub.componentName" $ctx) }}
      type: Opaque
      data:
        - objectName: "redis-keda-key"
          key: redis-keda-key
