{{- $component := "notifier" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "skillhub.componentName" $ctx }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ include "skillhub.componentName" $ctx }}
    kind: Deployment
  pollingInterval: {{ .Values.notifier.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.notifier.keda.cooldownPeriod }}
  minReplicaCount: {{ .Values.notifier.keda.minReplicaCount }}
  maxReplicaCount: {{ .Values.notifier.keda.maxReplicaCount }}
  # Scale-to-zero. AGENTS.md §4 rule 4: producers (M5-6) persist the
  # motivating Cosmos state before queueing, and replays are deduped via
  # `notif:sent:{idempotency_key}` so a pod crash mid-BLPOP can't fan out
  # duplicate emails.
  triggers:
    - type: redis
      metadata:
        address: "{{ .Values.notifier.env.REDIS_HOST }}:{{ .Values.notifier.env.REDIS_PORT }}"
        listName: {{ .Values.notifier.keda.queueKey | quote }}
        listLength: {{ .Values.notifier.keda.queueLength | quote }}
        enableTLS: "true"
        databaseIndex: "0"
      authenticationRef:
        name: {{ printf "%s-redis" (include "skillhub.componentName" $ctx) }}
