{{- /*
KEDA TriggerAuthentication for the notifier Redis scaler.

Same shape and same rationale as the classifier / defender TriggerAuths
— KEDA's Redis scaler can't use Entra workload identity for the data
plane, so we hand it an access key sourced from Key Vault via the
notifier SecretProviderClass.

The notifier app pods themselves still authenticate to Redis with
workload identity (redis_use_entra=true).
*/ -}}
{{- $component := "notifier" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: {{ printf "%s-redis" (include "skillhub.componentName" $ctx) }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  secretTargetRef:
    - parameter: password
      name: {{ printf "%s-redis-keda" (include "skillhub.componentName" $ctx) }}
      key: redis-keda-key
