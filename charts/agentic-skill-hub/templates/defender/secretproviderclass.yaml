{{- /*
SecretProviderClass for the defender pod (M5-2).

Mounts:
  - foundry-api-key  (LLM provider creds; exposed as AZURE_AI_FOUNDRY_API_KEY)
  - redis-keda-key   (only for the KEDA Redis scaler's TriggerAuthentication;
                      defender app pods themselves use Entra workload
                      identity — see templates/defender/deployment.yaml.)

`secretObjects.syncSecret.enabled` is what creates the K8s Secret that
KEDA's TriggerAuthentication references; without it the SPC mount only
materialises files on the pod filesystem, not as a cluster Secret.
*/ -}}
{{- $component := "defender" -}}
{{- $ctx := dict "component" $component "Chart" .Chart "Release" .Release "Values" .Values -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ printf "%s-secrets" (include "skillhub.componentName" $ctx) }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "skillhub.componentLabels" $ctx | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ include "skillhub.wiClientId" $ctx | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyVault.secrets.defender }}
        - |
          objectName: {{ . | quote }}
          objectType: secret
        {{- end }}
        - |
          objectName: "redis-keda-key"
          objectType: secret
  secretObjects:
    - secretName: {{ printf "%s-foundry" (include "skillhub.componentName" $ctx) }}
      type: Opaque
      data:
        - objectName: "foundry-api-key"
          key: foundry-api-key
    - secretName: {{ printf "%s-redis-keda" (include "skillhub.componentName" $ctx) }}
      type: Opaque
      data:
        - objectName: "redis-keda-key"
          key: redis-keda-key
