{{- /*
ServiceAccounts — one per component, names hard-coded to `frontend`,
`backend`, `classifier`, `curator` because the federated credentials in
infra/modules/identity.bicep pin to these exact subject strings:

  system:serviceaccount:{{ .Values.global.namespace }}:frontend
  system:serviceaccount:{{ .Values.global.namespace }}:backend
  ...

If you rename these you MUST also update the federated credential
`subject` in identity.bicep — both halves are part of the trust contract.

The `azure.workload.identity/client-id` annotation is what the AKS WI
webhook uses to issue per-pod federated tokens.
*/ -}}
{{- $namespace := .Values.global.namespace -}}
{{- range $component := list "frontend" "backend" "classifier" "curator" "defender" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $component }}
  namespace: {{ $namespace }}
  labels:
    {{- include "skillhub.componentLabels" (dict "component" $component "Chart" $.Chart "Release" $.Release) | nindent 4 }}
  annotations:
    azure.workload.identity/client-id: {{ include "skillhub.wiClientId" (dict "component" $component "Values" $.Values) | quote }}
    azure.workload.identity/tenant-id: {{ $.Values.global.azureTenantId | quote }}
# `automountServiceAccountToken: true` is the K8s default but make it
# explicit — workload identity webhook needs the projected SA token
# volume present.
automountServiceAccountToken: true
{{- end }}
