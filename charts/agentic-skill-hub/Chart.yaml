apiVersion: v2
name: agentic-skill-hub
description: |
  Umbrella chart for the Agentic Skill Hub on AKS (M4).

  Renders four workloads — frontend (Deployment + Ingress), backend
  (Deployment + Ingress + RBAC for curator on-demand Jobs), classifier
  (KEDA-scaled Deployment), curator (CronJob + suspended on-demand
  CronJob template). All pods authenticate to Azure via per-component
  workload-identity ServiceAccounts; the backend additionally owns a
  narrow K8s Role granting `create jobs` on the `curator-ondemand`
  CronJob only (AGENTS.md §5 second line of defense).

  See .agents/plans/m4-aks-deployment.md for the full design contract.
type: application
version: 0.1.0
appVersion: "0.2.0"
kubeVersion: ">=1.29.0"
keywords:
  - agentic-skill-hub
  - skills
  - keda
  - workload-identity
maintainers:
  - name: agentic-skill-hub
# Same artwork as the frontend favicon (`frontend/app/icon.png`). Kept
# alongside Chart.yaml so the path resolves whether the chart is rendered
# from the repo or unpacked from a packaged tarball.
icon: file://icon.png
