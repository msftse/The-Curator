<!doctype html>
<html><head><meta charset="utf-8"><style>
html,body{margin:0;background:#04100a;font-family:ui-monospace,Menlo,monospace;color:#e9fff4;overflow:hidden;}
.wrap{position:relative;width:1280px;height:420px;}
.grid{position:absolute;inset:0;background-image:linear-gradient(#0c2417 1px,transparent 1px),linear-gradient(90deg,#0c2417 1px,transparent 1px);background-size:40px 40px;opacity:0.6;}
.vign{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,255,136,0.06),transparent 60%,rgba(0,0,0,0.85));}
.scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0,rgba(0,0,0,0.18) 2px,transparent 2px,transparent 4px);pointer-events:none;}

/* logo */
.logo{position:absolute;left:80px;top:90px;width:240px;height:240px;border-radius:40px;background:#04100a;border:2px solid #0f2a18;overflow:hidden;}
.bracket{position:absolute;inset:0;}
.bracket svg{position:absolute;inset:0;}
.bracket path{stroke:#00ff88;stroke-width:9;fill:none;stroke-linecap:square;filter:drop-shadow(0 0 6px #00ff88);
  stroke-dasharray:200;stroke-dashoffset:200;animation:draw 5s linear infinite;}
.bracket .b2{animation-delay:0.15s;}
@keyframes draw{0%{stroke-dashoffset:200;}14%,100%{stroke-dashoffset:0;}}

.bars{position:absolute;left:102px;top:102px;}
.bar{height:9px;border-radius:2px;margin-bottom:9px;background:#1f3a26;transform:scaleX(0);transform-origin:left;animation:grow 5s linear infinite;filter:drop-shadow(0 0 4px rgba(0,255,136,0.4));}
.bar.b1{width:60px;animation-delay:0.7s;}
.bar.b2{width:74px;animation-delay:0.9s;background:linear-gradient(90deg,#9bffcb,#00ff88,#00b86b);}
.bar.b3{width:48px;animation-delay:1.1s;}
@keyframes grow{0%,15%{transform:scaleX(0);}25%,100%{transform:scaleX(1);}}

.beam{position:absolute;left:86px;top:70px;width:94px;height:2px;background:#9bffcb;filter:drop-shadow(0 0 6px #ccffe4);opacity:0;animation:sweep 5s linear infinite;}
@keyframes sweep{
  0%,28%{opacity:0;top:70px;}
  30%{opacity:0.9;top:70px;}
  48%{opacity:0.9;top:180px;}
  66%{opacity:0.9;top:70px;}
  68%,100%{opacity:0;}
}
.dot{position:absolute;left:175px;top:118px;width:14px;height:14px;border-radius:50%;background:#ccffe4;filter:drop-shadow(0 0 10px #00ff88);opacity:0;animation:pulse 5s linear infinite;}
@keyframes pulse{
  0%,48%{opacity:0;transform:scale(0);}
  50%{opacity:1;transform:scale(1.4);}
  56%{opacity:1;transform:scale(1);}
  90%,100%{opacity:1;transform:scale(1);}
}

/* wordmark */
.wm{position:absolute;left:460px;top:155px;font-size:96px;font-weight:800;letter-spacing:-3px;line-height:1;opacity:0;animation:wm 5s linear infinite;}
.wm .layer{position:absolute;left:0;top:0;}
.wm .red{color:#ff2d6b;transform:translate(4px,0);}
.wm .cyan{color:#00e0ff;transform:translate(-4px,0);}
.wm .main{color:#e9fff4;filter:drop-shadow(0 0 8px rgba(0,255,136,0.5));}
@keyframes wm{
  0%,52%{opacity:0;transform:translateX(-30px);}
  60%{opacity:1;transform:translateX(0);}
  62%{opacity:0.6;transform:translateX(2px);}
  64%{opacity:1;transform:translateX(0);}
  100%{opacity:1;transform:translateX(0);}
}
.prompt{position:absolute;left:360px;top:155px;font-size:72px;font-weight:800;color:#00ff88;filter:drop-shadow(0 0 8px #00ff88);opacity:0;animation:wm 5s linear infinite;}

.rule{position:absolute;left:460px;top:278px;font-size:14px;color:#0f4a2b;letter-spacing:4px;opacity:0;animation:fade 5s linear infinite;animation-delay:0.1s;}
.tag{position:absolute;left:460px;top:300px;font-size:22px;font-weight:600;color:#00ff88;letter-spacing:6px;opacity:0;animation:fade 5s linear infinite;animation-delay:0.15s;}
.pipe{position:absolute;left:460px;top:340px;font-size:16px;color:#7ad8a7;letter-spacing:2px;opacity:0;animation:fade 5s linear infinite;animation-delay:0.2s;}
.pipe .arr{color:#0f4a2b;margin:0 12px;}
.pipe .last{color:#00ff88;}
@keyframes fade{0%,64%{opacity:0;}74%,100%{opacity:1;}}

/* REC + telemetry */
.rec{position:absolute;right:140px;top:32px;display:flex;align-items:center;gap:10px;}
.rec .d{width:10px;height:10px;border-radius:50%;background:#ff4d4d;filter:drop-shadow(0 0 6px #ff4d4d);animation:blink 1s linear infinite;}
.rec .t{font-size:12px;color:#7ad8a7;letter-spacing:3px;}
@keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:0.2;}}
.sys{position:absolute;right:30px;top:32px;font-size:12px;color:#3b7a55;letter-spacing:2px;}
.telem{position:absolute;left:30px;bottom:18px;font-size:11px;color:#3b7a55;letter-spacing:2px;}
.ticks svg{position:absolute;inset:0;}
.ticks path{stroke:#1f3a26;stroke-width:2;fill:none;}
</style></head>
<body>
<div class="wrap">
  <div class="grid"></div>
  <div class="vign"></div>

  <div class="logo">
    <div class="bracket">
      <svg viewBox="0 0 240 240"><path d="M 178 64 L 84 64 L 84 96"/></svg>
      <svg viewBox="0 0 240 240"><path class="b2" d="M 178 180 L 84 180 L 84 148"/></svg>
    </div>
    <div class="bars">
      <div class="bar b1"></div>
      <div class="bar b2"></div>
      <div class="bar b3"></div>
    </div>
    <div class="beam"></div>
    <div class="dot"></div>
  </div>

  <div class="prompt">▸</div>
  <div class="wm">
    <span class="layer red">the-curator</span>
    <span class="layer cyan">the-curator</span>
    <span class="layer main">the-curator</span>
  </div>
  <div class="rule">────────────────────────────────────────</div>
  <div class="tag">GOVERNED SKILLS FOR AGENTS</div>
  <div class="pipe">classify<span class="arr">→</span>scan<span class="arr">→</span>catalog<span class="arr">→</span><span class="last">curate</span></div>

  <div class="rec"><div class="d"></div><div class="t">REC</div></div>
  <div class="sys">SYS://CURATOR · v0.14.0 · M5</div>
  <div class="telem">[catalog: stable] · [defender: armed] · [curator: weekly · sun 03:00 UTC] · [notifier: acs]</div>

  <div class="ticks">
    <svg viewBox="0 0 1280 420"><path d="M 24 24 L 24 64 M 24 24 L 64 24 M 1256 24 L 1256 64 M 1256 24 L 1216 24 M 24 396 L 24 356 M 24 396 L 64 396 M 1256 396 L 1256 356 M 1256 396 L 1216 396"/></svg>
  </div>

  <div class="scan"></div>
</div>
</body></html>
