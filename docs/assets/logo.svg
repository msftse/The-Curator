<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9bffcb"/>
      <stop offset="0.5" stop-color="#00ff88"/>
      <stop offset="1" stop-color="#00b86b"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ccffe4" stop-opacity="1"/>
      <stop offset="0.4" stop-color="#00ff88" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity="0.18"/>
    </pattern>
    <clipPath id="frame">
      <rect x="8" y="8" width="240" height="240" rx="44"/>
    </clipPath>
  </defs>

  <!-- frame -->
  <rect x="8" y="8" width="240" height="240" rx="44" fill="#04100a"/>
  <rect x="8" y="8" width="240" height="240" rx="44" fill="none" stroke="#0f2a18" stroke-width="2"/>

  <g clip-path="url(#frame)">
    <!-- grid backdrop -->
    <g stroke="#0c2417" stroke-width="1" opacity="0.7">
      <path d="M 8 56 H 248 M 8 96 H 248 M 8 136 H 248 M 8 176 H 248 M 8 216 H 248"/>
      <path d="M 56 8 V 248 M 96 8 V 248 M 136 8 V 248 M 176 8 V 248 M 216 8 V 248"/>
    </g>

    <!-- ambient core glow -->
    <circle cx="128" cy="128" r="86" fill="url(#core)" opacity="0.35"/>

    <!-- bracket-C mark: stylized C built from corner brackets + a scanning sweep -->
    <g filter="url(#glow)" stroke="url(#g)" stroke-width="9" stroke-linecap="square" fill="none">
      <!-- top corner -->
      <path d="M 184 70 L 90 70 L 90 100"/>
      <!-- bottom corner -->
      <path d="M 184 186 L 90 186 L 90 156"/>
    </g>

    <!-- inner stack: 3 skill bars, middle one is curated/green -->
    <g transform="translate(108,108)" filter="url(#glow)">
      <rect x="0"  y="0"  width="60" height="9" rx="2" fill="#1f3a26"/>
      <rect x="0"  y="18" width="74" height="9" rx="2" fill="url(#g)"/>
      <rect x="0"  y="36" width="48" height="9" rx="2" fill="#1f3a26"/>
    </g>

    <!-- scanning beam -->
    <line x1="92" y1="128" x2="186" y2="128" stroke="#9bffcb" stroke-width="1.2" opacity="0.85" filter="url(#strongGlow)"/>
    <line x1="92" y1="128" x2="186" y2="128" stroke="#00ff88" stroke-width="0.6" opacity="0.6"/>

    <!-- check pulse dot, right edge of the bracket -->
    <circle cx="186" cy="128" r="6" fill="#ccffe4" filter="url(#strongGlow)"/>

    <!-- REC indicator -->
    <g transform="translate(28,28)">
      <circle cx="0" cy="0" r="4" fill="#ff4d4d" filter="url(#glow)"/>
      <text x="10" y="4" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#7ad8a7" letter-spacing="2">REC</text>
    </g>

    <!-- version tag -->
    <text x="228" y="34" text-anchor="end" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#3b7a55" letter-spacing="1.5">v0.14</text>

    <!-- bottom callout -->
    <text x="128" y="226" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="12" font-weight="700" fill="#00ff88" letter-spacing="6" filter="url(#glow)">CURATOR</text>

    <!-- scanlines overlay -->
    <rect x="0" y="0" width="256" height="256" fill="url(#scan)"/>
  </g>
</svg>
